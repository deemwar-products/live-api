version: '3'

dotenv: [".env"]

tasks:
  db:start:
    desc: Start the local Postgres container (pgvector + pg_cron)
    cmds:
      - docker compose up -d

  db:stop:
    desc: Stop the local Postgres container
    cmds:
      - docker compose down

  db:reset:
    desc: Stop the local Postgres container AND delete its data volume (WARNING - deletes all data)
    cmds:
      - docker compose down -v
      - echo "✅ Postgres container and volume cleared"

  db:shell:
    desc: Open a psql shell into the running Postgres container
    cmds:
      - docker exec -it live-api-poc-postgres psql -U $POSTGRES_USER -d $POSTGRES_DB

  pgadmin:start:
    desc: Start pgAdmin at http://localhost:5050
    cmds:
      - docker compose --profile pgadmin up -d pgadmin
      - echo "pgAdmin starting at http://localhost:5050 (admin@admin.com / admin)"

  pgadmin:stop:
    desc: Stop and remove the pgAdmin container
    cmds:
      - docker compose --profile pgadmin stop pgadmin
      - docker compose --profile pgadmin rm -f pgadmin
